# --- Site -------------------------------------------------------------------
title: Ahmed Y. Elmogy
tagline: Independent security researcher
description: >-
  Vulnerability research and security advisories by Ahmed Y. Elmogy, an
  independent security researcher. Published CVEs in Dell, ATEN, Ivanti,
  Red Hat and QNAP products.
url: "https://masterofthepuppets.github.io"
baseurl: ""
lang: en
timezone: Africa/Cairo

# --- Identity ---------------------------------------------------------------
# advisory_prefix is baked into every advisory ID. The IDs are meant to be
# citable, so changing this after publication breaks every saved link.
advisory_prefix: AYE

author:
  name: Ahmed Y. Elmogy
  handle: masterofthepuppets

github_username: masterofthepuppets
twitter_username: AhmedYElmogy

# Blank deliberately: any address rendered here gets scraped within days.
# Set it and the About page grows a contact line; leave it and it doesn't.
email:

# --- Build ------------------------------------------------------------------
# No `theme:` key, on purpose. Every layout under _layouts/ is hand-written,
# so no theme markup or theme CSS is inherited.
plugins:
  - jekyll-feed      # /feed.xml   — static Atom, for people who subscribe
  - jekyll-sitemap   # /sitemap.xml — static XML, referenced by robots.txt

collections:
  advisories:
    output: true
    permalink: /advisories/:name/

defaults:
  - scope: { path: "", type: advisories }
    values: { layout: advisory }
  - scope: { path: "", type: posts }
    values: { layout: post }

feed:
  path: /feed.xml

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
