---
layout: default
---
<article class="wrap wrap--prose">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-date">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {%- if page.advisory %} · <a href="{{ '/advisories/' | append: page.advisory | downcase | append: '/' | relative_url }}">{{ page.advisory }}</a>{% endif %}
      {%- if page.cve %} · <span class="mono">{{ page.cve }}</span>{% endif %}
    </p>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
